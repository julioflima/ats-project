# Local dev — frontend runs Vite with hot reload; backend and chroma keep the
# same service topology used by deployment.
services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000" # host 8001 so scripts on the host can reach it
    volumes:
      - ./data/chroma-server:/data
    # No healthcheck: the chroma image ships no shell tools to probe with;
    # the backend's chromadb client retries the connection on first use.

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      SQLITE_PATH: /data/registry/app.db
      CVS_DIR: /data/cvs
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      GCS_BUCKET: ${GCS_BUCKET:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    volumes:
      - ./data:/data
      - ./scripts:/srv/scripts:ro # so `docker compose run backend python /srv/scripts/generate_cvs.py` works
    depends_on:
      - chroma

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
