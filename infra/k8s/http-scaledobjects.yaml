# Scale-to-zero, wake-on-request (PLAN.md section 8.2): the interceptor holds
# the first request while the target pod cold-starts, then forwards it — the
# waking request is served slowly, not dropped. Kept for RAM headroom on the
# 1 GB VM; the free VM's bill is flat either way (section 8.6).
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: frontend
spec:
  pathPrefixes:
    - / # catch-all; the backend object below wins on its more specific prefixes
  scaleTargetRef:
    name: frontend
    kind: Deployment
    apiVersion: apps/v1
    service: frontend
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300 # 5 min idle before sleeping
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: backend
spec:
  pathPrefixes:
    - /graphql
    - /api
  scaleTargetRef:
    name: backend
    kind: Deployment
    apiVersion: apps/v1
    service: backend
    port: 8000
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300
