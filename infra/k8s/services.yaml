# ClusterIP everywhere — nothing is directly internet-facing; Traefik + the
# KEDA interceptor are the only path in (PLAN.md section 8.5).
apiVersion: v1
kind: Service
metadata:
  name: chroma
spec:
  selector:
    app: chroma
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Ingress backends must live in the same namespace, but the KEDA interceptor
# runs in the keda namespace — this ExternalName service bridges the two
# (Traefik follows ExternalName backends).
apiVersion: v1
kind: Service
metadata:
  name: keda-interceptor
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
    - port: 8080
